name: Atualização Diária

on:
  schedule:
    - cron: '0 14 * * *'  # 11h BRT (UTC-3) todos os dias
  workflow_dispatch:        # permite rodar manualmente pelo painel do GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Criar pasta output
        run: mkdir -p output data

      - name: Pipeline completo (Zendesk + Metabase + Supabase)
        env:
          ZENDESK_EMAIL:        ${{ secrets.ZENDESK_EMAIL }}
          ZENDESK_TOKEN:        ${{ secrets.ZENDESK_TOKEN }}
          METABASE_URL:         ${{ secrets.METABASE_URL }}
          METABASE_EMAIL:       ${{ secrets.METABASE_EMAIL }}
          METABASE_PASSWORD:    ${{ secrets.METABASE_PASSWORD }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 updater.py

      - name: Publicar no GitHub Pages
        run: |
          cp cx-portal.html index.html
          cp output/metabase_data.js data/metabase_data.js
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html index.html cx-portal.html data/metabase_data.js services/metabase.js
          git diff --staged --quiet || git commit -m "data: atualização automática $(date -u '+%d/%m/%Y %H:%M BRT')"
          git push
